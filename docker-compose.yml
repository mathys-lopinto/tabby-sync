services:
    tabby:
        build: .
        restart: unless-stopped
        depends_on:
            db:
                condition: service_healthy
        ports:
            - "${HOST_PORT:-9090}:80"
        environment:
            - DATABASE_URL=postgres://${DB_USER:?set DB_USER}:${DB_PASSWORD:?set DB_PASSWORD}@db:5432/${DB_NAME:?set DB_NAME}
            - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:?set DJANGO_SECRET_KEY}
            - DEBUG=${DEBUG:-False}
            - PORT=80
            - WEB_CONCURRENCY=${WEB_CONCURRENCY:-4}

    db:
        image: postgres:18.3-alpine3.23
        restart: unless-stopped
        environment:
            POSTGRES_DB: ${DB_NAME:?set DB_NAME}
            POSTGRES_USER: ${DB_USER:?set DB_USER}
            POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD}
        volumes:
            - db_data:/var/lib/postgresql/18/docker
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
            interval: 5s
            timeout: 5s
            retries: 10

volumes:
    db_data:
