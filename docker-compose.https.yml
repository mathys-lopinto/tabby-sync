services:
    tabby:
        # Override the base compose mapping: caddy is the only entry point.
        ports: []

    caddy:
        image: caddy:2.11.2-alpine
        restart: always
        depends_on:
            tabby:
                condition: service_started
        ports:
            - "80:80"
            - "443:443"
            - "443:443/udp"
        environment:
            - DOMAIN=${DOMAIN:?set DOMAIN}
            - ACME_EMAIL=${ACME_EMAIL:-}
        volumes:
            - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
            - ./caddy/ssl:/etc/caddy/ssl:ro
            - caddy_data:/data
            - caddy_config:/config
        healthcheck:
            test: ["CMD", "wget", "-qO-", "http://127.0.0.1:2019/config/"]
            interval: 30s
            timeout: 5s
            retries: 3

volumes:
    caddy_data:
    caddy_config:
