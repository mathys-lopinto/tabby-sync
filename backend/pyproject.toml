[tool.poetry]
name = "tabby-sync"
version = "1.0.0"
description = "Minimal Tabby config sync backend"
authors = []

[tool.poetry.dependencies]
python = "^3.14"
Django = "^5.1"
djangorestframework = "^3.15"
python-dotenv = "^1.0"
dj-database-url = "^2.2"
gunicorn = "^23.0"
